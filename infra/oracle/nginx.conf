user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── n8n HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;   # Replace with your domain if using one

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── CORS for CYPHER cockpit ───────────────────────────────────────────
        # Allow the Vercel gateway + local desktop app to call n8n webhooks
        add_header Access-Control-Allow-Origin  "https://cypher.olune.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cypher-Secret" always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── n8n proxy ─────────────────────────────────────────────────────────
        location / {
            proxy_pass http://n8n:5678;

            proxy_http_version 1.1;

            # WebSocket upgrade (n8n UI + push events require WS)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts — n8n workflow executions can run for minutes
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 10s;

            # Buffer off for SSE / streaming responses
            proxy_buffering off;
        }
    }
}
